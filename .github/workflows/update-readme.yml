name: Latest blog post workflow

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme-with-blog:
    name: Update README with latest blog posts
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in acuherb.xyz posts
        uses: gautamkrishnar/blog-post-workflow@v2
        with:
          feed_list: 'https://acuherb.xyz/index.xml?nocache=${{ github.run_id }}'
          feed_names: '观颐斋'
          template: '- 📝 [$title]($url "$date")$newline'
          max_post_count: 5
          tag_post_pre_newline: true
          committer_username: github-actions
          committer_email: github-actions@github.com
          commit_message: "docs: update latest blog posts"
          replace_existing: true
